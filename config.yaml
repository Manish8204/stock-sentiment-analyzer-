# Stock Sentiment Analyzer Configuration

# News API Configuration
newsapi:
  api_key: "your_newsapi_key_here"
  language: "en"
  sort_by: "publishedAt"
  
# Stock Selection
stocks:
  - symbol: "AAPL"
    name: "Apple Inc."
    sector: "Technology"
  - symbol: "GOOGL"
    name: "Alphabet Inc."
    sector: "Technology"
  - symbol: "MSFT"
    name: "Microsoft Corporation"
    sector: "Technology"
  - symbol: "TSLA"
    name: "Tesla Inc."
    sector: "Automotive"
  - symbol: "AMZN"
    name: "Amazon.com Inc."
    sector: "E-commerce"
  - symbol: "META"
    name: "Meta Platforms Inc."
    sector: "Technology"

# Data Collection
data_collection:
  news_articles_days: 30  # Fetch news from last N days
  articles_per_stock: 50  # Articles to fetch per stock
  historical_data_days: 365  # Historical stock data period
  
# Sentiment Analysis
sentiment_analysis:
  method: "vader"  # Options: vader, textblob, transformers, ensemble
  min_score_threshold: 0.3  # Minimum confidence score
  categories:
    positive: "bullish"
    negative: "bearish"
    neutral: "neutral"
    
# Technical Analysis
technical_indicators:
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bollinger_period: 20
  bollinger_std: 2
  
# Price Prediction Models
prediction:
  test_size: 0.2
  validation_split: 0.1
  models:
    - lstm
    - random_forest
    - xgboost
    - ensemble
  
  lstm:
    layers: [128, 64, 32]
    dropout: 0.2
    epochs: 50
    batch_size: 32
    lookback: 60
    
  random_forest:
    n_estimators: 100
    max_depth: 20
    min_samples_split: 5
    
  xgboost:
    n_estimators: 100
    max_depth: 7
    learning_rate: 0.1
    
# Visualization
visualization:
  theme: "darkly"
  show_predictions: true
  show_confidence_interval: true
  
# Logging
logging:
  level: "INFO"
  save_logs: true
  log_file: "logs/stock_analyzer.log"
